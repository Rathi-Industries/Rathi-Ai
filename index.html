<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rathi AI - Advanced OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        body { background-color: #020617; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .rathi-glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(59, 130, 246, 0.2); }
        .gradient-rathi { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // SIR, MAINE AAPKI KEY YAHAN DAL DI HAI
        const API_KEY = "AIzaSyB-ZQeHNRBiXE9_Iym4HSS14aEx-5kDxv4";

        const App = () => {
            const [input, setInput] = useState("");
            const [messages, setMessages] = useState([
                { role: "ai", content: "Welcome to Rathi Industries. I am Rathi AI, your virtual assistant. How can I help you, Sir?" }
            ]);
            const [loading, setLoading] = useState(false);
            const chatRef = useRef(null);

            useEffect(() => {
                chatRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [messages]);

            const handleSend = async () => {
                if (!input.trim()) return;
                const userMsg = input;
                setInput("");
                setMessages(prev => [...prev, { role: "user", content: userMsg }]);
                setLoading(true);

                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `You are Rathi AI, created by Aditya Rathi (Age 13). Be professional. Address the user as Sir. Question: ${userMsg}` }] }]
                        })
                    });
                    const data = await res.json();
                    const reply = data.candidates[0].content.parts[0].text;
                    setMessages(prev => [...prev, { role: "ai", content: reply }]);
                } catch (e) {
                    setMessages(prev => [...prev, { role: "ai", content: "Sir, network connection lost. Rathi Servers are unreachable." }]);
                } finally { setLoading(false); }
            };

            return (
                <div className="flex flex-col h-screen max-w-md mx-auto bg-[#020617] relative">
                    <header className="p-4 rathi-glass flex items-center justify-between border-b border-blue-900/20">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-xl gradient-rathi flex items-center justify-center font-black text-white text-xl shadow-[0_0_15px_rgba(37,99,235,0.4)]">R</div>
                            <h1 className="text-sm font-extrabold tracking-widest text-white uppercase">Rathi <span className="text-blue-500">AI</span></h1>
                        </div>
                        <span className="text-[10px] text-blue-500 font-bold animate-pulse">ONLINE</span>
                    </header>

                    <div className="flex-1 overflow-y-auto p-4 space-y-5 pb-28">
                        {messages.map((m, i) => (
                            <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`max-w-[85%] p-4 rounded-2xl text-[14px] leading-relaxed ${m.role === 'ai' ? 'rathi-glass text-slate-200' : 'gradient-rathi text-white'}`}>
                                    {m.content}
                                </div>
                            </div>
                        ))}
                        {loading && <div className="text-blue-500 text-[10px] animate-pulse font-bold uppercase tracking-widest">Rathi AI is thinking...</div>}
                        <div ref={chatRef}></div>
                    </div>

                    <footer className="absolute bottom-0 w-full p-4 bg-gradient-to-t from-[#020617] via-[#020617] to-transparent">
                        <div className="flex items-center rathi-glass rounded-2xl px-4 py-1.5 border border-blue-500/20">
                            <input 
                                className="flex-1 bg-transparent py-3 outline-none text-sm placeholder:text-slate-700"
                                placeholder="Command Rathi AI..."
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                onKeyDown={(e) => e.key === 'Enter' && handleSend()}
                            />
                            <button onClick={handleSend} className="p-2 text-blue-500 hover:text-white transition-colors">
                                <i data-lucide="zap" className="w-6 h-6 fill-current"></i>
                            </button>
                        </div>
                        <div className="text-center mt-3">
                            <p className="text-[9px] text-blue-900 font-bold tracking-[0.2em] uppercase">© 2026 Rathi Industries Global</p>
                            <p className="text-[7px] text-slate-700 mt-0.5">Founder: Aditya Rathi (Age 13)</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
